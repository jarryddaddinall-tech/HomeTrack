# CI: lint and test on every push/PR. Vercel handles CD (auto-deploy on push to main).
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "_archive/package-lock.json"

      - name: Install dependencies
        run: npm ci
        working-directory: _archive

      - name: Lint
        run: npm run lint
        working-directory: _archive

      - name: Test
        run: npm run test
        working-directory: _archive
