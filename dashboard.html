<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>HomeClear — Deals</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="app-page">
  <header class="app-header">
    <a href="dashboard.html" class="logo">
      <div class="logo-mark">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/>
          <path d="M9 21V12h6v9"/>
        </svg>
      </div>
      HomeClear
    </a>
    <div class="nav-user" id="nav-user"></div>
  </header>

  <main class="app-main">
    <div class="wrap">
      <p class="page-role" id="page-role"></p>

      <div class="dashboard-stats" id="dashboard-stats" hidden>
        <span class="dashboard-stat" id="dashboard-stat-count">0 deals</span>
        <span class="dashboard-stat dashboard-stat--muted" id="dashboard-stat-summary"></span>
      </div>

      <section class="dashboard-hero">
        <div class="dashboard-hero-visual" aria-hidden="true">
          <svg class="dashboard-hero-svg" viewBox="0 0 240 160" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M120 20L200 70v90H40V70L120 20z" stroke="var(--green)" stroke-width="2.5" stroke-linejoin="round" fill="rgba(46,204,138,0.08)"/>
            <path d="M120 55v85M85 75l35 20 35-20" stroke="var(--green)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
            <circle cx="168" cy="58" r="14" stroke="var(--green)" stroke-width="2" fill="var(--white)"/>
            <path d="M168 52v6l4 4" stroke="var(--green)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <h1 class="dashboard-hero-title">Your deals in one place</h1>
        <p class="dashboard-hero-sub">Track every stage—offers, surveys, contracts, completion—without the chase.</p>
      </section>

      <section class="dashboard-deals">
        <h2 class="sec-title">Deals</h2>
        <div id="project-list" class="project-list"></div>
        <a href="new-project.html" class="btn-primary" id="btn-create-project">Create project</a>
      </section>
    </div>

    <footer class="app-footer">
      <div class="app-footer-inner">
        <div class="app-footer-brand">
          <a href="dashboard.html" class="app-footer-logo">HomeClear</a>
          <p class="app-footer-tagline">One place for your sale, your purchase, and your peace of mind.</p>
        </div>
        <nav class="app-footer-links">
          <a href="dashboard.html">Deals</a>
          <a href="new-project.html">New project</a>
          <a href="login.html">Log in</a>
          <a href="#">Privacy</a>
          <a href="#">Terms</a>
        </nav>
      </div>
      <p class="app-footer-copy">&copy; 2026 HomeClear. All rights reserved.</p>
    </footer>
  </main>

  <script src="app.js"></script>
  <script>
    (function () {
      if (!window.HomeClear.requireAuth()) return;

      var user = window.HomeClear.getCurrentUser();
      var roleLabel = window.HomeClear.ROLE_LABELS[user.role] || user.role;

      window.HomeClear.renderNavUser(document.getElementById('nav-user'));

      var roleEl = document.getElementById('page-role');
      roleEl.textContent = roleLabel + ' view';
      roleEl.className = 'page-role ' + user.role;

      var isListViewModel = user.role === 'agent' || user.role === 'solicitor';
      document.getElementById('btn-create-project').style.display = isListViewModel ? '' : 'none';

      var container = document.getElementById('project-list');
      var projects = window.HomeClear.getProjects();

      if (isListViewModel && projects.length > 0) {
        var statsEl = document.getElementById('dashboard-stats');
        var countEl = document.getElementById('dashboard-stat-count');
        var summaryEl = document.getElementById('dashboard-stat-summary');
        statsEl.hidden = false;
        countEl.textContent = projects.length + ' deal' + (projects.length === 1 ? '' : 's');
        var onTrack = projects.filter(function(p) { return p.status === 'On track'; }).length;
        var atRisk = projects.filter(function(p) { return p.status === 'At risk'; }).length;
        var delayed = projects.filter(function(p) { return p.status === 'Delayed'; }).length;
        var parts = [];
        if (onTrack) parts.push(onTrack + ' on track');
        if (atRisk) parts.push(atRisk + ' at risk');
        if (delayed) parts.push(delayed + ' delayed');
        summaryEl.textContent = parts.length ? parts.join(' · ') : '';
      }

      if (isListViewModel) {
        container.className = 'project-list project-list--list';
        var header = document.createElement('div');
        header.className = 'deal-list-header';
        header.innerHTML =
          '<span class="deal-cell-address">Address</span>' +
          '<span class="deal-cell-seller">Seller</span>' +
          '<span class="deal-cell-buyer">Buyer</span>' +
          '<span class="deal-cell-price">Price</span>' +
          '<span>Status</span>' +
          '<span></span>';
        container.appendChild(header);
        projects.forEach(function (p) {
          var statusClass = (p.status === 'On track') ? 'on-track' : (p.status === 'At risk') ? 'at-risk' : 'delayed';
          var row = document.createElement('div');
          row.className = 'deal-row';
          var a = document.createElement('a');
          a.href = 'project.html?id=' + p.id;
          a.className = 'deal-row-link';
          a.innerHTML =
            '<span class="deal-cell deal-cell-address">' + escapeHtml(p.address) + '</span>' +
            '<span class="deal-cell deal-cell-seller deal-cell-meta">' + escapeHtml(p.sellerName || '—') + '</span>' +
            '<span class="deal-cell deal-cell-buyer deal-cell-meta">' + escapeHtml(p.buyerName || '—') + '</span>' +
            '<span class="deal-cell deal-cell-price">' + escapeHtml(p.salePrice) + '</span>' +
            '<span class="deal-cell deal-cell-status">' +
              '<span class="dot ' + statusClass + '" aria-hidden="true"></span>' +
              escapeHtml(p.status || '—') +
            '</span>' +
            '<span class="deal-cell deal-cell-chevron" aria-hidden="true">' +
              '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>' +
            '</span>';
          row.appendChild(a);
          container.appendChild(row);
        });
      } else {
        projects.forEach(function (p) {
          var a = document.createElement('a');
          a.href = 'project.html?id=' + p.id;
          a.className = 'project-card';
          a.innerHTML =
            '<div class="project-card-address">' + escapeHtml(p.address) + '</div>' +
            '<div class="project-card-meta">' + escapeHtml(p.agentName) + ' · ' + escapeHtml(p.solicitorName) + '</div>' +
            '<div class="project-card-price">' + escapeHtml(p.salePrice) + '</div>';
          container.appendChild(a);
        });
      }
      function escapeHtml(s) {
        var div = document.createElement('div');
        div.textContent = s;
        return div.innerHTML;
      }
    })();
  </script>
</body>
</html>
